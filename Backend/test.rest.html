<!doctype html>
<html lang="en">
    <head>
        <title>Reset Your Password</title>
        <style>
            body {
                font-family: sans-serif;
                display: flex;
                justify-content: center;
                padding-top: 50px;
                background-color: #f4f7f6;
            }
            .card {
                border: 1px solid #ccc;
                padding: 20px;
                border-radius: 8px;
                width: 350px;
                background: white;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            .password-container {
                position: relative;
                margin: 10px 0;
            }
            input {
                width: 100%;
                padding: 10px;
                padding-right: 45px; /* Space for the toggle button */
                box-sizing: border-box;
                border: 1px solid #ddd;
                border-radius: 4px;
            }
            .toggle-btn {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                color: #007bff;
                cursor: pointer;
                font-size: 0.8em;
                font-weight: bold;
                padding: 0;
                width: auto; /* Overrides global button style */
            }
            .submit-btn {
                width: 100%;
                padding: 12px;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-top: 10px;
            }
            .submit-btn:hover {
                background: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h3>Reset Password</h3>
            <p id="token-display" style="font-size: 0.7em; color: gray"></p>

            <div class="password-container">
                <input type="password" id="new-password" placeholder="Enter new password" />
                <button type="button" class="toggle-btn" onclick="togglePassword()">Show</button>
            </div>

            <button class="submit-btn" onclick="submitReset()">Update Password</button>
            <p id="message"></p>
        </div>

        <script>
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            document.getElementById('token-display').innerText = 'Token: ' + (token || 'Missing');

            // --- Toggle Password Visibility ---
            function togglePassword() {
                const passwordInput = document.getElementById('new-password');
                const toggleBtn = document.querySelector('.toggle-btn');

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleBtn.innerText = 'Hide';
                } else {
                    passwordInput.type = 'password';
                    toggleBtn.innerText = 'Show';
                }
            }

            // --- Submit Reset ---
            async function submitReset() {
                const password = document.getElementById('new-password').value;
                const messageEl = document.getElementById('message');

                if (!token) {
                    messageEl.style.color = 'red';
                    messageEl.innerText = 'Error: Invalid or missing token.';
                    return;
                }

                try {
                    const response = await fetch(
                        `http://localhost:5000/api/auth/reset-password/${token}`,
                        {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password }),
                        },
                    );

                    const data = await response.json();
                    if (data.success) {
                        messageEl.style.color = 'green';
                        messageEl.innerText = 'Success! Password updated.';
                    } else {
                        messageEl.style.color = 'red';
                        messageEl.innerText = data.message;
                    }
                } catch (err) {
                    messageEl.style.color = 'red';
                    messageEl.innerText = 'Error connecting to server.';
                }
            }
        </script>
    </body>
</html>
